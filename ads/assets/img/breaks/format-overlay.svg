  <text x="180" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">CONTENT</text>
  <rect x="245" y="32" width="100" height="62" rx="5" fill="#DD6B20" fill-opacity="0.72" stroke="#1A202C" stroke-width="2"/>
  <text x="295" y="69" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">OVERLAY</text>
  <text x="180" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1A202C">semi-transparent overlay over live content</text>
